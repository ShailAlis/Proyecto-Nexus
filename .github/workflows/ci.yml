# NEXUS CI — No auto-deploy policy
# Este pipeline solo valida calidad de código. NUNCA despliega a ningún entorno.

name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check agents/

  lint-docker:
    name: Lint Dockerfiles (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: agents/Dockerfile
          failure-threshold: warning

  test-python:
    name: Tests (pytest + coverage)
    runs-on: ubuntu-latest
    needs: [lint-python]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "agents/[dev]" 2>/dev/null || true
          pip install pytest pytest-cov pytest-asyncio
          pip install -r agents/requirements.txt 2>/dev/null || true
          cd agents && pip install -e ".[dev]" 2>/dev/null || pip install . 2>/dev/null || true

      - name: Run pytest with coverage
        run: |
          cd agents
          if find tests/ -name "test_*.py" -o -name "*_test.py" 2>/dev/null | grep -q .; then
            pytest tests/ -v --cov=. --cov-report=term-missing --cov-fail-under=70
          else
            echo "No test files found, skipping."
          fi
