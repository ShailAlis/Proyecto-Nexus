# NEXUS CI — No auto-deploy policy
# Este pipeline solo valida calidad de código. NUNCA despliega a ningún entorno.

name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check agents/ --fix --exit-zero

  lint-docker:
    name: Lint Dockerfiles (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: hadolint agents/Dockerfile

  test-python:
    name: Tests (pytest + coverage)
    runs-on: ubuntu-latest
    needs: [lint-python]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov pytest-asyncio \
            langchain langchain-anthropic langchain-ollama \
            langgraph psycopg2-binary redis pydantic \
            python-dotenv httpx aiohttp discord.py

      - name: Run pytest with coverage
        run: |
          cd agents
          if find tests/ -name "test_*.py" -o -name "*_test.py" 2>/dev/null | grep -q .; then
            pytest tests/ -v --cov=. --cov-report=term-missing --cov-fail-under=40
          else
            echo "No test files found, skipping."
          fi
